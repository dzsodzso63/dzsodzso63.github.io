<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dzso's Homepage</title>
  <meta
    name="description"
    content="Personal homepage of Dzso with links to selected projects."
  />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://dzsodzso63.github.io/" />
  <style>
    :root {
      --bg: #f7f7f7;
      --text: #1f1f1f;
      --muted: #666;
      --card: #fff;
      --border: #ddd;
      --accent: #ff7900;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .intro {
      margin: 0 0 32px;
      color: var(--muted);
    }

    .projects {
      display: grid;
      gap: 16px;
    }

    .card {
      display: block;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: inherit;
      text-decoration: none;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
    }

    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Dzso's Homepage</h1>
    <p class="intro">A small collection of my projects.</p>

    <section class="projects" aria-label="Projects">
      <a
        class="card"
        href="https://dzsodzso63.github.io/iwiw_forum/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <h2>iWiW Forum Archive</h2>
        <p>Browsable archive of old iWiW forum topics.</p>
      </a>

      <a
        class="card"
        href="https://liten-sky.vercel.app/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <h2>LitenSky Weather App</h2>
        <p>A lightweight weather app project.</p>
      </a>
    </section>

    <footer>
      GitHub:
      <a
        href="https://github.com/dzsodzso63"
        target="_blank"
        rel="noopener noreferrer"
      >
        github.com/dzsodzso63
      </a>
    </footer>
  </main>
</body>
</html>
